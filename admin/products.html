<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات - Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
    <div id="sidebarSlot"></div>
    <main class="admin-main" id="mainContent"></main>
</div>

<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
Admin.init('products');

const editId = SEVICH.getQueryParam('edit');
const isNew = SEVICH.getQueryParam('new') !== null;

function render() {
    const products = SEVICH.getProducts();
    
    if (editId || isNew) {
        const p = editId ? SEVICH.getProduct(editId) : {
            id: '', title: '', description: '', short_description: '',
            price: 0, compare_price: 0, images: [], variants: [],
            stock: 100, badge: 'Sale', features: [],
        };
        if (editId && !p) {
            window.location.href = 'products.html';
            return;
        }
        renderForm(p, !!editId);
    } else {
        renderList(products);
    }
}

function renderList(products) {
    document.getElementById('mainContent').innerHTML = `
    <div class="admin-header">
        <h1>📦 المنتجات (${products.length})</h1>
        <a href="?new=1" class="btn-admin btn-primary">+ إضافة منتج</a>
    </div>
    
    <div class="admin-card">
        <div class="admin-card-body no-padding">
            ${products.length === 0 ? `
                <div class="empty-state">
                    <div class="icon">📦</div>
                    <p>لا توجد منتجات</p>
                    <a href="?new=1" class="btn-admin btn-primary" style="margin-top:16px;">إضافة أول منتج</a>
                </div>
            ` : `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>الاسم</th>
                            <th>السعر</th>
                            <th>السعر القديم</th>
                            <th>المخزون</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(p => `
                            <tr>
                                <td>${p.images[0] ? `<img src="${SEVICH.escapeAttr(p.images[0])}" alt="" class="product-thumb">` : ''}</td>
                                <td>
                                    <strong>${SEVICH.escapeHtml(p.title)}</strong>
                                    <div style="font-size:11px; color:#888; margin-top:2px; font-family:monospace;">${SEVICH.escapeHtml(p.id)}</div>
                                </td>
                                <td style="font-weight:600;">${(p.price || 0).toLocaleString()} DA</td>
                                <td style="color:#888; text-decoration:line-through;">${(p.compare_price || 0).toLocaleString()} DA</td>
                                <td>${p.stock || 0}</td>
                                <td>
                                    <div class="btn-group">
                                        <a href="../product.html?id=${encodeURIComponent(p.id)}" target="_blank" class="btn-admin btn-sm btn-outline">👁 عرض</a>
                                        <a href="?edit=${encodeURIComponent(p.id)}" class="btn-admin btn-sm btn-primary">✏️ تعديل</a>
                                        <button class="btn-admin btn-sm btn-danger" data-action="delete" data-id="${SEVICH.escapeAttr(p.id)}">🗑 حذف</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `}
        </div>
    </div>
    `;
    
    document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) deleteProduct(btn.dataset.id);
        });
    });
}

function renderForm(p, isEdit) {
    document.getElementById('mainContent').innerHTML = `
    <div class="admin-header">
        <h1>📦 ${isEdit ? '✏️ تعديل المنتج' : '+ إضافة منتج جديد'}</h1>
        <a href="products.html" class="btn-admin btn-outline">إلغاء</a>
    </div>
    
    <div class="admin-card">
        <div class="admin-card-body">
            <form class="admin-form" id="productForm">
                <input type="hidden" name="id" value="${SEVICH.escapeAttr(p.id)}">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>اسم المنتج <small>(يظهر في الموقع)</small></label>
                        <input type="text" name="title" required value="${SEVICH.escapeAttr(p.title)}">
                    </div>
                    <div class="form-group">
                        <label>الشارة <small>(Sale, جديد...)</small></label>
                        <input type="text" name="badge" value="${SEVICH.escapeAttr(p.badge || '')}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>الوصف القصير <small>(جملة واحدة)</small></label>
                    <input type="text" name="short_description" value="${SEVICH.escapeAttr(p.short_description || '')}">
                </div>
                
                <div class="form-group">
                    <label>الوصف الكامل</label>
                    <textarea name="description" rows="5">${SEVICH.escapeHtml(p.description || '')}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>السعر الحالي (DA)</label>
                        <input type="number" step="0.01" name="price" required value="${p.price || 0}">
                    </div>
                    <div class="form-group">
                        <label>السعر القديم (للمقارنة)</label>
                        <input type="number" step="0.01" name="compare_price" value="${p.compare_price || 0}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>المخزون</label>
                    <input type="number" name="stock" value="${p.stock || 0}">
                </div>
                
                <div class="form-group">
                    <label>روابط الصور <small>(رابط واحد في كل سطر)</small></label>
                    <textarea name="images" rows="4">${SEVICH.escapeHtml((p.images || []).join('\n'))}</textarea>
                </div>
                
                <div class="form-group">
                    <label>المميزات <small>(ميزة في كل سطر، تظهر في صفحة المنتج)</small></label>
                    <textarea name="features" rows="5" placeholder="تركيبة أمريكية أصلية 100%&#10;تغطية فورية في 30 ثانية">${SEVICH.escapeHtml((p.features || []).join('\n'))}</textarea>
                </div>
                
                <div class="form-group">
                    <label>الألوان / الخيارات <small>(اسم في كل سطر، اتركه فارغا إن لم يكن هناك خيارات)</small></label>
                    <textarea name="variant_names" rows="3" placeholder="أسود&#10;بني داكن&#10;بني فاتح">${SEVICH.escapeHtml((p.variants || []).map(v => v.name).join('\n'))}</textarea>
                </div>
                
                <div style="display:flex; gap:8px;">
                    <button type="submit" class="btn-admin btn-primary">حفظ المنتج</button>
                    <a href="products.html" class="btn-admin btn-outline">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
    `;
    
    document.getElementById('productForm').addEventListener('submit', saveProduct);
}

function saveProduct(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const id = fd.get('id') || 'product-' + Date.now();
    
    const images = fd.get('images').split('\n').map(s => s.trim()).filter(Boolean);
    const features = fd.get('features').split('\n').map(s => s.trim()).filter(Boolean);
    const variantNames = fd.get('variant_names').split('\n').map(s => s.trim()).filter(Boolean);
    const variants = variantNames.map((name, i) => ({ name, value: 'variant-' + (i + 1) }));
    
    const newProduct = {
        id: id,
        title: fd.get('title'),
        description: fd.get('description'),
        short_description: fd.get('short_description'),
        price: parseFloat(fd.get('price')) || 0,
        compare_price: parseFloat(fd.get('compare_price')) || 0,
        images: images,
        variants: variants,
        stock: parseInt(fd.get('stock')) || 0,
        badge: fd.get('badge') || '',
        features: features,
    };
    
    let products = SEVICH.getProducts();
    const idx = products.findIndex(p => p.id === id);
    if (idx >= 0) {
        products[idx] = newProduct;
    } else {
        products.push(newProduct);
    }
    SEVICH.saveProducts(products);
    SEVICH.toast('✓ تم حفظ المنتج', 'success');
    setTimeout(() => window.location.href = 'products.html', 800);
}

function deleteProduct(id) {
    let products = SEVICH.getProducts();
    products = products.filter(p => p.id !== id);
    SEVICH.saveProducts(products);
    SEVICH.toast('✓ تم حذف المنتج', 'success');
    setTimeout(() => render(), 500);
}

render();
</script>

</body>
</html>
