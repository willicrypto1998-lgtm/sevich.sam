<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="login-page">

<form class="login-card admin-form" id="loginForm">
    <h1>🔐 لوحة التحكم</h1>
    <p>سجّل الدخول للمتابعة</p>
    
    <div class="login-error" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    
    <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" required autofocus>
    </div>
    
    <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required>
    </div>
    
    <button type="submit" class="btn-admin btn-primary" style="width:100%; padding:12px; justify-content:center; font-size:15px;">
        تسجيل الدخول
    </button>
    
    <p style="text-align:center; margin-top:24px; font-size:12px; color:#888;">
        الافتراضي: <strong>admin</strong> / <strong>admin123</strong><br>
        غيّرها فورا من الإعدادات
    </p>
</form>

<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
// Si déjà connecté, rediriger
if (Admin.isLoggedIn()) {
    window.location.href = 'index.html';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = e.target.username.value.trim();
    const password = e.target.password.value;
    const errorEl = document.getElementById('loginError');
    
    if (Admin.login(username, password)) {
        window.location.href = 'index.html';
    } else {
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
    }
});
</script>

</body>
</html>
