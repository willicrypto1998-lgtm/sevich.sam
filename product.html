<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتج | Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="product">

<div id="site-header-slot"></div>

<main id="productMain"></main>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/layout.js"></script>
<script>
document.addEventListener('layout:ready', function() {
    const productId = SEVICH.getQueryParam('id');
    const product = SEVICH.getProduct(productId);
    const main = document.getElementById('productMain');
    
    if (!product) {
        main.innerHTML = `
            <div class="container" style="padding:80px 20px; text-align:center;">
                <h1>المنتج غير موجود</h1>
                <p style="margin:20px 0;">عذرا، لم يتم العثور على هذا المنتج.</p>
                <a href="catalog.html" class="btn btn-dark">العودة للكاتالوج</a>
            </div>
        `;
        return;
    }
    
    document.title = product.title + ' | ' + SEVICH.getConfig().site_name;
    
    const reviews = ReviewsGenerator.generate(product.id, SEVICH.getConfig().reviews_per_product);
    const stats = ReviewsGenerator.getStats(reviews);
    const discount = product.compare_price > product.price 
        ? Math.round(((product.compare_price - product.price) / product.compare_price) * 100) 
        : 0;
    
    let selectedVariant = product.variants && product.variants.length > 0 ? product.variants[0].value : null;
    let selectedVariantName = product.variants && product.variants.length > 0 ? product.variants[0].name : null;
    
    // Facebook Pixel : ViewContent
    if (typeof fbq !== 'undefined') {
        fbq('track', 'ViewContent', {
            content_ids: [product.id],
            content_name: product.title,
            content_type: 'product',
            value: product.price,
            currency: 'DZD',
        });
    }
    
    function renderStars(rating) {
        return '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
    }
    
    main.innerHTML = `
    <section class="product-page">
        <div class="container">
            <div class="product-layout">
                <div class="product-gallery">
                    <div class="gallery-main">
                        <img src="${SEVICH.escapeAttr(product.images[0])}" alt="${SEVICH.escapeAttr(product.title)}" id="mainImage">
                    </div>
                    <div class="gallery-thumbs">
                        ${product.images.map((img, i) => `
                            <button class="gallery-thumb ${i === 0 ? 'active' : ''}" data-img="${SEVICH.escapeAttr(img)}">
                                <img src="${SEVICH.escapeAttr(img)}" alt="" loading="lazy">
                            </button>
                        `).join('')}
                    </div>
                </div>
                
                <div class="product-details">
                    <h1>${SEVICH.escapeHtml(product.title)}</h1>
                    
                    ${stats.count > 0 ? `
                    <div class="product-rating-row">
                        <span class="stars">${renderStars(stats.average)}</span>
                        <strong>${stats.average}</strong>
                        <a href="#reviews">${stats.count} تقييم</a>
                    </div>` : ''}
                    
                    <div class="product-price">
                        ${discount > 0 ? `
                            <span class="price-sale">${SEVICH.formatPrice(product.price)}</span>
                            <span class="price-regular">${SEVICH.formatPrice(product.compare_price)}</span>
                            <span class="discount-badge">وفر ${discount}%</span>
                        ` : `<span class="price-sale">${SEVICH.formatPrice(product.price)}</span>`}
                    </div>
                    
                    <p class="product-short-desc">${SEVICH.escapeHtml(product.short_description || '')}</p>
                    
                    ${product.features && product.features.length > 0 ? `
                    <div class="product-features">
                        <h4>مميزات المنتج:</h4>
                        <ul>
                            ${product.features.map(f => `<li>${SEVICH.escapeHtml(f)}</li>`).join('')}
                        </ul>
                    </div>` : ''}
                    
                    ${product.variants && product.variants.length > 0 ? `
                    <div class="product-options">
                        <div class="option-group">
                            <label class="option-label">اللون: <span id="selectedVariant">${SEVICH.escapeHtml(selectedVariantName)}</span></label>
                            <div class="option-buttons" id="variantButtons">
                                ${product.variants.map((v, i) => `
                                    <button type="button" class="option-btn ${i === 0 ? 'selected' : ''}" 
                                        data-variant="${SEVICH.escapeAttr(v.value)}" 
                                        data-name="${SEVICH.escapeAttr(v.name)}">
                                        ${SEVICH.escapeHtml(v.name)}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>` : ''}
                    
                    <div id="cartLimitWarning" class="cart-warning"></div>
                    
                    <div class="qty-and-add">
                        <div class="qty-control">
                            <button type="button" id="qtyMinus">−</button>
                            <input type="number" id="qtyInput" value="1" min="1" max="${SEVICH.getConfig().max_cart_items}">
                            <button type="button" id="qtyPlus">+</button>
                        </div>
                        <button type="button" class="btn btn-dark btn-add-cart btn-lg" id="addToCartBtn">
                            أضف إلى السلة
                        </button>
                    </div>
                    
                    <div class="product-buy-now">
                        <button type="button" class="btn btn-accent btn-block btn-lg" id="buyNowBtn">
                            اشتر الآن — الدفع عند الاستلام
                        </button>
                    </div>
                    
                    <div class="product-trust">
                        <div class="trust-row">
                            <span class="icon">🚚</span>
                            <div><strong>توصيل لـ 58 ولاية</strong> — التوصيل من 2 إلى 5 أيام عمل</div>
                        </div>
                        <div class="trust-row">
                            <span class="icon">💵</span>
                            <div><strong>الدفع عند الاستلام</strong> — لا حاجة للدفع المسبق</div>
                        </div>
                        <div class="trust-row">
                            <span class="icon">🔒</span>
                            <div><strong>منتج أصلي 100%</strong> — جودة مضمونة</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="product-tabs">
                <div class="tabs-nav">
                    <button class="tab-link active" data-tab="description">الوصف الكامل</button>
                    <button class="tab-link" data-tab="reviews">التقييمات (${stats.count})</button>
                    <button class="tab-link" data-tab="shipping">التوصيل والإرجاع</button>
                </div>
                
                <div class="tab-content active" id="tab-description">
                    <p>${SEVICH.escapeHtml(product.description || '').replace(/\n/g, '<br>')}</p>
                </div>
                
                <div class="tab-content" id="tab-reviews">
                    <div class="reviews-section" id="reviews">
                        ${stats.count > 0 ? `
                        <div class="reviews-summary">
                            <div class="reviews-overall">
                                <div class="big-rating">${stats.average.toFixed(1)}</div>
                                <div class="stars-big">${renderStars(stats.average)}</div>
                                <p>بناءً على ${stats.count} تقييم</p>
                            </div>
                            <div class="reviews-distribution">
                                ${[5,4,3,2,1].map(s => {
                                    const cnt = stats.distribution[s] || 0;
                                    const pct = stats.count > 0 ? Math.round((cnt / stats.count) * 100) : 0;
                                    return `
                                    <div class="dist-row">
                                        <span>${s} ★</span>
                                        <div class="dist-bar"><div class="dist-bar-fill" style="width: ${pct}%"></div></div>
                                        <span class="dist-count">${cnt}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                        <div class="reviews-list" id="reviewsList"></div>
                        ${reviews.length > 5 ? `
                        <div class="reviews-load-more">
                            <button class="btn btn-outline" id="loadMoreReviews">عرض المزيد من التقييمات</button>
                        </div>` : ''}
                        ` : '<p style="text-align:center; padding:40px 20px; color:#888;">لا توجد تقييمات بعد</p>'}
                    </div>
                </div>
                
                <div class="tab-content" id="tab-shipping">
                    <p><strong>التوصيل:</strong> نقوم بالتوصيل لجميع الولايات الـ 58 في الجزائر.</p>
                    <p>📦 توصيل للمنزل: ${SEVICH.formatPrice(SEVICH.getConfig().shipping_home)}</p>
                    <p>🏢 توصيل للمكتب: ${SEVICH.formatPrice(SEVICH.getConfig().shipping_office)}</p>
                    <p style="margin-top:16px;"><strong>مدة التوصيل:</strong> من 2 إلى 5 أيام عمل حسب الولاية.</p>
                </div>
            </div>
        </div>
    </section>
    `;
    
    // Render reviews
    function renderReview(review) {
        const initial = review.name.charAt(0);
        return `
        <div class="review-card">
            <div class="review-header">
                <div class="review-author">
                    <div class="review-avatar">${SEVICH.escapeHtml(initial)}</div>
                    <div class="review-meta">
                        <div class="review-name">
                            ${SEVICH.escapeHtml(review.name)}
                            ${review.verified ? '<span class="review-verified">✓ مشتري موثق</span>' : ''}
                        </div>
                        <div class="review-info">${SEVICH.escapeHtml(review.city)} · ${ReviewsGenerator.timeAgo(review.date)}</div>
                    </div>
                </div>
                <div class="review-rating-row">
                    <span class="review-stars">${renderStars(review.rating)}</span>
                </div>
            </div>
            <h5 class="review-title">${SEVICH.escapeHtml(review.title)}</h5>
            <p class="review-text">${SEVICH.escapeHtml(review.text)}</p>
            ${review.helpful > 0 ? `<div class="review-helpful">👍 ${review.helpful} أشخاص وجدوا هذا التقييم مفيدا</div>` : ''}
        </div>
        `;
    }
    
    const reviewsList = document.getElementById('reviewsList');
    if (reviewsList) {
        reviewsList.innerHTML = reviews.slice(0, 5).map(renderReview).join('');
    }
    
    let loadedReviews = 5;
    const loadMoreBtn = document.getElementById('loadMoreReviews');
    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', () => {
            const next = reviews.slice(loadedReviews, loadedReviews + 5);
            reviewsList.insertAdjacentHTML('beforeend', next.map(renderReview).join(''));
            loadedReviews += 5;
            if (loadedReviews >= reviews.length) loadMoreBtn.style.display = 'none';
        });
    }
    
    // Gallery thumbs
    document.querySelectorAll('.gallery-thumb').forEach(thumb => {
        thumb.addEventListener('click', () => {
            document.getElementById('mainImage').src = thumb.dataset.img;
            document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
        });
    });
    
    // Variants
    document.querySelectorAll('#variantButtons .option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#variantButtons .option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedVariant = btn.dataset.variant;
            selectedVariantName = btn.dataset.name;
            const sv = document.getElementById('selectedVariant');
            if (sv) sv.textContent = selectedVariantName;
        });
    });
    
    // Quantity
    const qtyInput = document.getElementById('qtyInput');
    const MAX = SEVICH.getConfig().max_cart_items;
    
    document.getElementById('qtyMinus').addEventListener('click', () => {
        const v = parseInt(qtyInput.value) || 1;
        if (v > 1) qtyInput.value = v - 1;
    });
    
    document.getElementById('qtyPlus').addEventListener('click', () => {
        const v = parseInt(qtyInput.value) || 1;
        const currentInCart = Cart.getTotalItems();
        const maxAddable = MAX - currentInCart + v;
        if (v < maxAddable) {
            qtyInput.value = v + 1;
        } else {
            const w = document.getElementById('cartLimitWarning');
            w.textContent = `الحد الأقصى للطلب هو ${MAX} قطع. حاليا في السلة: ${currentInCart}`;
            w.classList.add('show');
            setTimeout(() => w.classList.remove('show'), 4000);
        }
    });
    
    function getProductData() {
        return {
            id: product.id + (selectedVariant ? '-' + selectedVariant : ''),
            title: product.title,
            price: product.price,
            comparePrice: product.compare_price,
            image: product.images[0],
            variant: selectedVariant,
            variantName: selectedVariantName,
        };
    }
    
    document.getElementById('addToCartBtn').addEventListener('click', () => {
        const qty = parseInt(qtyInput.value) || 1;
        if (Cart.add(getProductData(), qty)) {
            qtyInput.value = 1;
            setTimeout(() => {
                document.getElementById('cartDrawer')?.classList.add('active');
                document.getElementById('cartBackdrop')?.classList.add('active');
                document.body.style.overflow = 'hidden';
            }, 400);
        }
    });
    
    document.getElementById('buyNowBtn').addEventListener('click', () => {
        const qty = parseInt(qtyInput.value) || 1;
        if (Cart.add(getProductData(), qty)) {
            setTimeout(() => window.location.href = 'checkout.html', 200);
        }
    });
    
    // Tabs
    document.querySelectorAll('.tab-link').forEach(link => {
        link.addEventListener('click', () => {
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            link.classList.add('active');
            document.getElementById('tab-' + link.dataset.tab)?.classList.add('active');
        });
    });
});
</script>

</body>
</html>
