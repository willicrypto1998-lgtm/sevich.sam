<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كل المنتجات | Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="catalog">

<div id="site-header-slot"></div>

<main>
<section class="section">
    <div class="container">
        <div class="section-header" style="text-align:right; margin-bottom:24px;">
            <h1 class="section-title">كل المنتجات</h1>
        </div>
        
        <div class="catalog-header">
            <div class="catalog-count" id="catalogCount">— منتج</div>
            <select class="catalog-sort" id="catalogSort">
                <option value="default">الترتيب الافتراضي</option>
                <option value="price-asc">السعر: من الأقل للأعلى</option>
                <option value="price-desc">السعر: من الأعلى للأقل</option>
                <option value="name">الاسم: أ-ي</option>
            </select>
        </div>
        
        <div class="product-grid" id="productsGrid"></div>
    </div>
</section>
</main>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/layout.js"></script>
<script>
document.addEventListener('layout:ready', function() {
    const sortSelect = document.getElementById('catalogSort');
    const grid = document.getElementById('productsGrid');
    const countEl = document.getElementById('catalogCount');
    
    function render() {
        let products = SEVICH.getProducts();
        const sort = sortSelect.value;
        
        if (sort === 'price-asc') products.sort((a, b) => a.price - b.price);
        else if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);
        else if (sort === 'name') products.sort((a, b) => a.title.localeCompare(b.title));
        
        countEl.textContent = `${products.length} منتج`;
        
        if (products.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#888;">لا توجد منتجات</p>';
            return;
        }
        
        grid.innerHTML = products.map(product => {
            const reviews = ReviewsGenerator.generate(product.id, SEVICH.getConfig().reviews_per_product);
            const stats = ReviewsGenerator.getStats(reviews);
            const discount = product.compare_price > product.price 
                ? Math.round(((product.compare_price - product.price) / product.compare_price) * 100) 
                : 0;
            
            return `
            <article class="product-card">
                <a href="product.html?id=${encodeURIComponent(product.id)}">
                    <div class="product-card-image">
                        ${discount > 0 ? `<span class="product-badge">-${discount}%</span>` : ''}
                        <img src="${SEVICH.escapeAttr(product.images[0])}" alt="${SEVICH.escapeAttr(product.title)}" class="img-primary" loading="lazy">
                        ${product.images[1] ? `<img src="${SEVICH.escapeAttr(product.images[1])}" alt="" class="img-secondary" loading="lazy">` : ''}
                        <span class="product-quick-add">عرض المنتج</span>
                    </div>
                </a>
                <div class="product-card-info">
                    ${stats.count > 0 ? `
                    <div class="product-rating-mini">
                        <span class="stars">★★★★★</span>
                        <span>${stats.average}</span>
                        <span>(${stats.count})</span>
                    </div>` : ''}
                    <h3 class="product-card-title">
                        <a href="product.html?id=${encodeURIComponent(product.id)}">${SEVICH.escapeHtml(product.title)}</a>
                    </h3>
                    <div class="product-card-price">
                        ${discount > 0 ? `
                            <span class="price-sale">${SEVICH.formatPrice(product.price)}</span>
                            <span class="price-regular">${SEVICH.formatPrice(product.compare_price)}</span>
                        ` : `<span class="price-current">${SEVICH.formatPrice(product.price)}</span>`}
                    </div>
                </div>
            </article>
            `;
        }).join('');
    }
    
    sortSelect.addEventListener('change', render);
    render();
});
</script>

</body>
</html>
