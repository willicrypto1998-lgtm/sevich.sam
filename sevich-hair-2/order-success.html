<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم تأكيد الطلب | Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="success">

<div id="site-header-slot"></div>

<main>
<section class="section">
    <div class="container">
        <div class="order-success">
            <div class="order-success-icon">✓</div>
            <h1 style="font-size:28px; margin-bottom:12px;">تم تأكيد طلبك بنجاح!</h1>
            <p style="color:var(--color-text-light); font-size:16px;">شكرا لثقتك. سنتواصل معك قريبا لتأكيد تفاصيل التوصيل.</p>
            
            <div class="order-number" id="orderNumber" style="display:none;"></div>
            
            <div style="text-align:right; background:var(--color-bg-soft); padding:20px; border-radius:var(--radius-md); margin:24px 0;">
                <h3 style="font-size:16px; margin-bottom:12px;">الخطوات التالية:</h3>
                <ul style="list-style:none; padding:0;">
                    <li style="padding:6px 0;">📞 سيتصل بك فريقنا خلال 24 ساعة لتأكيد الطلب</li>
                    <li style="padding:6px 0;">📦 يتم التحضير والشحن خلال يوم إلى يومين</li>
                    <li style="padding:6px 0;">🚚 التوصيل خلال 2 إلى 5 أيام حسب الولاية</li>
                    <li style="padding:6px 0;">💵 الدفع نقدا عند استلام الطرد</li>
                </ul>
            </div>
            
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:24px;">
                <a href="index.html" class="btn btn-dark">العودة للرئيسية</a>
                <a href="catalog.html" class="btn btn-outline">تابع التسوق</a>
            </div>
        </div>
    </div>
</section>
</main>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/layout.js"></script>
<script>
document.addEventListener('layout:ready', function() {
    const orderId = SEVICH.getQueryParam('order');
    if (orderId) {
        const el = document.getElementById('orderNumber');
        el.textContent = 'رقم الطلب: ' + orderId;
        el.style.display = 'block';
    }
});
</script>

</body>
</html>
