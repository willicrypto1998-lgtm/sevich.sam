<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevich Hair - الرئيسية</title>
<meta name="description" content="منتجات العناية بالشعر الأصلية - توصيل لـ 58 ولاية والدفع عند الاستلام">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="home">

<div id="site-header-slot"></div>

<main>
    <!-- Hero -->
    <section class="hero-section">
        <img src="https://sevich-hair-2.myshopify.com/cdn/shop/files/747179e5-ec2b-4c3e-ba02-f349027e72c3.__CR0_6_1920_1188_PT0_SX970_V1.jpg?v=1766735918&width=2000" alt="Sevich Hair">
        <div class="hero-content">
            <h1>منتجات العناية بالشعر الأصلية</h1>
            <p>توصيل سريع لـ 58 ولاية مع الدفع عند الاستلام</p>
            <a href="catalog.html" class="btn btn-dark btn-lg">تسوق الآن</a>
        </div>
    </section>

    <!-- Trust strip -->
    <section style="background:var(--color-bg-soft); padding:24px 0; border-bottom:1px solid var(--color-border-light);">
        <div class="container">
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:24px; text-align:center;">
                <div>
                    <div style="font-size:28px; margin-bottom:6px;">🚚</div>
                    <strong style="font-size:14px;">توصيل لـ 58 ولاية</strong>
                    <p style="font-size:12px; color:var(--color-text-light);">سريع ومضمون</p>
                </div>
                <div>
                    <div style="font-size:28px; margin-bottom:6px;">💵</div>
                    <strong style="font-size:14px;">الدفع عند الاستلام</strong>
                    <p style="font-size:12px; color:var(--color-text-light);">آمن 100%</p>
                </div>
                <div>
                    <div style="font-size:28px; margin-bottom:6px;">✅</div>
                    <strong style="font-size:14px;">منتجات أصلية</strong>
                    <p style="font-size:12px; color:var(--color-text-light);">جودة مضمونة</p>
                </div>
                <div>
                    <div style="font-size:28px; margin-bottom:6px;">🔄</div>
                    <strong style="font-size:14px;">إرجاع سهل</strong>
                    <p style="font-size:12px; color:var(--color-text-light);">في حالة المشكل</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Featured products -->
    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">المنتجات المتوفرة</h2>
                <p class="section-subtitle">تصفح أحدث منتجاتنا</p>
            </div>
            <div class="product-grid" id="productsGrid"></div>
        </div>
    </section>
</main>

<div id="site-footer-slot"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/reviews.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/layout.js"></script>
<script>
document.addEventListener('layout:ready', function() {
    const products = SEVICH.getProducts();
    const grid = document.getElementById('productsGrid');
    
    grid.innerHTML = products.map(product => {
        const reviews = ReviewsGenerator.generate(product.id, SEVICH.getConfig().reviews_per_product);
        const stats = ReviewsGenerator.getStats(reviews);
        const discount = product.compare_price > product.price 
            ? Math.round(((product.compare_price - product.price) / product.compare_price) * 100) 
            : 0;
        
        return `
        <article class="product-card">
            <a href="product.html?id=${encodeURIComponent(product.id)}">
                <div class="product-card-image">
                    ${product.badge ? `<span class="product-badge">${SEVICH.escapeHtml(product.badge)}</span>` : ''}
                    <img src="${SEVICH.escapeAttr(product.images[0])}" alt="${SEVICH.escapeAttr(product.title)}" class="img-primary" loading="lazy">
                    ${product.images[1] ? `<img src="${SEVICH.escapeAttr(product.images[1])}" alt="" class="img-secondary" loading="lazy">` : ''}
                    <span class="product-quick-add">عرض المنتج</span>
                </div>
            </a>
            <div class="product-card-info">
                ${stats.count > 0 ? `
                <div class="product-rating-mini">
                    <span class="stars">★★★★★</span>
                    <span>${stats.average}</span>
                    <span>(${stats.count})</span>
                </div>` : ''}
                <h3 class="product-card-title">
                    <a href="product.html?id=${encodeURIComponent(product.id)}">${SEVICH.escapeHtml(product.title)}</a>
                </h3>
                <div class="product-card-price">
                    ${discount > 0 ? `
                        <span class="price-sale">${SEVICH.formatPrice(product.price)}</span>
                        <span class="price-regular">${SEVICH.formatPrice(product.compare_price)}</span>
                    ` : `<span class="price-current">${SEVICH.formatPrice(product.price)}</span>`}
                </div>
            </div>
        </article>
        `;
    }).join('');
});
</script>

</body>
</html>
