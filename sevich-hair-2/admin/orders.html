<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطلبات - Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
    <div id="sidebarSlot"></div>
    <main class="admin-main" id="mainContent"></main>
</div>

<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
Admin.init('orders');

let filter = SEVICH.getQueryParam('filter') || 'all';
const viewing = SEVICH.getQueryParam('view');

function render() {
    const orders = Admin.getOrders();
    let filtered = [...orders].reverse();
    if (filter !== 'all') {
        filtered = filtered.filter(o => (o.status || 'pending') === filter);
    }
    
    const viewingOrder = viewing ? orders.find(o => o.id === viewing) : null;
    
    document.getElementById('mainContent').innerHTML = `
    <div class="admin-header">
        <h1>🛒 الطلبات (${orders.length})</h1>
        <div class="btn-group">
            <a href="?filter=all" class="btn-admin ${filter === 'all' ? 'btn-primary' : 'btn-outline'} btn-sm">الكل</a>
            <a href="?filter=pending" class="btn-admin ${filter === 'pending' ? 'btn-primary' : 'btn-outline'} btn-sm">قيد الانتظار</a>
            <a href="?filter=confirmed" class="btn-admin ${filter === 'confirmed' ? 'btn-primary' : 'btn-outline'} btn-sm">مؤكدة</a>
            <a href="?filter=shipped" class="btn-admin ${filter === 'shipped' ? 'btn-primary' : 'btn-outline'} btn-sm">مشحونة</a>
            <a href="?filter=delivered" class="btn-admin ${filter === 'delivered' ? 'btn-primary' : 'btn-outline'} btn-sm">مسلمة</a>
            <a href="?filter=cancelled" class="btn-admin ${filter === 'cancelled' ? 'btn-primary' : 'btn-outline'} btn-sm">ملغاة</a>
        </div>
    </div>
    
    ${viewingOrder ? renderOrderDetails(viewingOrder) : ''}
    
    <div class="admin-card">
        <div class="admin-card-body no-padding">
            ${filtered.length === 0 ? `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>لا توجد طلبات</p>
                </div>
            ` : `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>الزبون</th>
                            <th>الهاتف</th>
                            <th>الولاية</th>
                            <th>المنتجات</th>
                            <th>المبلغ</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(o => {
                            const totalQty = o.cart.reduce((s, i) => s + i.quantity, 0);
                            const wilayaName = SEVICH.wilayas[o.customer.wilaya] || o.customer.wilaya;
                            return `
                            <tr>
                                <td style="font-family:monospace; font-size:11px;">${SEVICH.escapeHtml(o.id)}</td>
                                <td>${SEVICH.escapeHtml(o.customer.full_name)}</td>
                                <td style="direction:ltr; text-align:right;">${SEVICH.escapeHtml(o.customer.phone)}</td>
                                <td>${SEVICH.escapeHtml(wilayaName)}</td>
                                <td>${totalQty} قطع</td>
                                <td style="font-weight:600;">${(o.total || 0).toLocaleString()} DA</td>
                                <td><span class="status-badge ${o.status || 'pending'}">${SEVICH.escapeHtml(o.status || 'pending')}</span></td>
                                <td style="font-size:11px; color:#888;">${formatDate(o.created_at)}</td>
                                <td>
                                    <a href="?view=${encodeURIComponent(o.id)}" class="btn-admin btn-sm btn-outline">عرض</a>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            `}
        </div>
    </div>
    `;
    
    // Bind status update
    document.querySelectorAll('[data-action="update-status"]').forEach(btn => {
        btn.addEventListener('click', () => updateOrderStatus(btn.dataset.orderId, document.getElementById('statusSelect').value));
    });
    document.querySelectorAll('[data-action="delete-order"]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) deleteOrder(btn.dataset.orderId);
        });
    });
}

function renderOrderDetails(order) {
    const wilayaName = SEVICH.wilayas[order.customer.wilaya] || order.customer.wilaya;
    const phoneClean = order.customer.phone.replace(/\D/g, '');
    
    return `
    <div class="admin-card" style="margin-bottom:20px;">
        <div class="admin-card-header">
            <h2>تفاصيل الطلب: ${SEVICH.escapeHtml(order.id)}</h2>
            <a href="orders.html" class="btn-admin btn-sm btn-outline">إغلاق</a>
        </div>
        <div class="admin-card-body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <h3 style="font-size:14px; margin-bottom:12px; color:#333;">👤 معلومات الزبون</h3>
                    <div class="order-detail-row">
                        <span class="label">الاسم:</span>
                        <span>${SEVICH.escapeHtml(order.customer.full_name)}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">الهاتف:</span>
                        <span style="direction:ltr; display:inline-block; font-weight:600;">
                            ${SEVICH.escapeHtml(order.customer.phone)}
                            <a href="https://wa.me/${phoneClean}" target="_blank" style="margin-right:8px;">💬</a>
                            <a href="tel:${SEVICH.escapeAttr(order.customer.phone)}" style="margin-right:4px;">📞</a>
                        </span>
                    </div>
                    ${order.customer.email ? `
                    <div class="order-detail-row">
                        <span class="label">البريد:</span>
                        <span>${SEVICH.escapeHtml(order.customer.email)}</span>
                    </div>` : ''}
                    <div class="order-detail-row">
                        <span class="label">الولاية:</span>
                        <span>${SEVICH.escapeHtml(order.customer.wilaya)} - ${SEVICH.escapeHtml(wilayaName)}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">البلدية:</span>
                        <span>${SEVICH.escapeHtml(order.customer.commune)}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">العنوان:</span>
                        <span>${SEVICH.escapeHtml(order.customer.address)}</span>
                    </div>
                    ${order.customer.notes ? `
                    <div class="order-detail-row">
                        <span class="label">ملاحظات:</span>
                        <span>${SEVICH.escapeHtml(order.customer.notes)}</span>
                    </div>` : ''}
                </div>
                
                <div>
                    <h3 style="font-size:14px; margin-bottom:12px; color:#333;">📦 تفاصيل الطلب</h3>
                    <div class="order-detail-row">
                        <span class="label">رقم الطلب:</span>
                        <span style="font-family:monospace; font-weight:600;">${SEVICH.escapeHtml(order.id)}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">التاريخ:</span>
                        <span>${formatDate(order.created_at)}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">طريقة التوصيل:</span>
                        <span>${(order.shipping || 'home') === 'office' ? '🏢 مكتب' : '🏠 منزل'}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">المجموع الفرعي:</span>
                        <span>${order.subtotal.toLocaleString()} DA</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="label">التوصيل:</span>
                        <span>${(order.shipping_cost || 0).toLocaleString()} DA</span>
                    </div>
                    <div class="order-detail-row" style="font-weight:700; font-size:16px; color:#1a7f37;">
                        <span class="label">الإجمالي:</span>
                        <span>${order.total.toLocaleString()} DA</span>
                    </div>
                </div>
            </div>
            
            <h3 style="font-size:14px; margin:24px 0 12px; color:#333;">🛍️ المنتجات</h3>
            <div class="order-items">
                ${order.cart.map(item => `
                    <div class="order-item-row">
                        <img src="${SEVICH.escapeAttr(item.image || '')}" alt="">
                        <div>
                            <strong style="font-size:13px;">${SEVICH.escapeHtml(item.title)}</strong>
                            ${item.variantName ? `<div style="color:#888; font-size:12px;">${SEVICH.escapeHtml(item.variantName)}</div>` : ''}
                            <div style="color:#666; font-size:12px;">الكمية: ${item.quantity} × ${item.price.toLocaleString()} DA</div>
                        </div>
                        <div style="font-weight:700; font-size:14px;">${(item.price * item.quantity).toLocaleString()} DA</div>
                    </div>
                `).join('')}
            </div>
            
            <div style="margin-top:20px; display:flex; gap:8px; flex-wrap:wrap; padding-top:16px; border-top:1px solid #e5e5e7;">
                <select id="statusSelect" style="padding:9px 12px; border:1px solid #d1d1d6; border-radius:6px; font-family:inherit; font-size:13px;">
                    <option value="pending" ${(order.status || 'pending') === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
                    <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>مؤكدة</option>
                    <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>مشحونة</option>
                    <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>مسلمة</option>
                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>ملغاة</option>
                </select>
                <button class="btn-admin btn-primary" data-action="update-status" data-order-id="${SEVICH.escapeAttr(order.id)}">تحديث الحالة</button>
                
                <button class="btn-admin btn-danger" style="margin-right:auto;" data-action="delete-order" data-order-id="${SEVICH.escapeAttr(order.id)}">حذف الطلب</button>
            </div>
        </div>
    </div>
    `;
}

function updateOrderStatus(orderId, newStatus) {
    const orders = Admin.getOrders();
    const idx = orders.findIndex(o => o.id === orderId);
    if (idx === -1) return;
    orders[idx].status = newStatus;
    orders[idx].status_updated_at = new Date().toISOString();
    Admin.saveOrders(orders);
    SEVICH.toast('✓ تم تحديث الحالة', 'success');
    setTimeout(() => render(), 500);
}

function deleteOrder(orderId) {
    let orders = Admin.getOrders();
    orders = orders.filter(o => o.id !== orderId);
    Admin.saveOrders(orders);
    SEVICH.toast('✓ تم حذف الطلب', 'success');
    setTimeout(() => window.location.href = 'orders.html', 500);
}

function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${dd}/${mm} ${hh}:${min}`;
}

render();
</script>

</body>
</html>
