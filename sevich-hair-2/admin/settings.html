<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإعدادات - Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
    <div id="sidebarSlot"></div>
    <main class="admin-main" id="mainContent"></main>
</div>

<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
Admin.init('settings');

function render() {
    const config = SEVICH.getConfig();
    
    document.getElementById('mainContent').innerHTML = `
    <div class="admin-header">
        <h1>⚙️ الإعدادات</h1>
    </div>
    
    <div id="alertSlot"></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        
        <div class="admin-card">
            <div class="admin-card-header">
                <h2>🏪 إعدادات الموقع</h2>
            </div>
            <div class="admin-card-body">
                <form class="admin-form" id="generalForm">
                    <div class="form-group">
                        <label>اسم الموقع</label>
                        <input type="text" name="site_name" value="${SEVICH.escapeAttr(config.site_name)}">
                    </div>
                    
                    <div class="form-group">
                        <label>الشعار العلوي <small>(الشريط فوق الموقع)</small></label>
                        <input type="text" name="site_tagline" value="${SEVICH.escapeAttr(config.site_tagline)}">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>رقم WhatsApp</label>
                            <input type="text" name="whatsapp_number" value="${SEVICH.escapeAttr(config.whatsapp_number)}" placeholder="+213XXXXXXXXX">
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" name="email" value="${SEVICH.escapeAttr(config.email)}">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>سعر التوصيل للمنزل (DA)</label>
                            <input type="number" name="shipping_home" value="${config.shipping_home}">
                        </div>
                        <div class="form-group">
                            <label>سعر التوصيل للمكتب (DA)</label>
                            <input type="number" name="shipping_office" value="${config.shipping_office}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>الحد الأقصى للقطع في الطلب الواحد</label>
                        <input type="number" name="max_cart_items" value="${config.max_cart_items}" min="1" max="20">
                        <small style="color:#888; display:block; margin-top:4px;">العميل لا يستطيع طلب أكثر من هذا العدد من القطع.</small>
                    </div>
                    
                    <button type="submit" class="btn-admin btn-primary">💾 حفظ الإعدادات</button>
                </form>
            </div>
        </div>
        
        <div class="admin-card">
            <div class="admin-card-header">
                <h2>📊 التسويق والتتبع</h2>
            </div>
            <div class="admin-card-body">
                <form class="admin-form" id="marketingForm">
                    <div class="form-group">
                        <label>Facebook Pixel ID</label>
                        <input type="text" name="facebook_pixel_id" value="${SEVICH.escapeAttr(config.facebook_pixel_id)}" placeholder="XXXXXXXXXXXXXXX">
                        <small style="color:#888; display:block; margin-top:4px;">
                            🔍 احصل عليه من: Meta Events Manager > Data Sources > Pixel
                        </small>
                    </div>
                    
                    <div class="form-group">
                        <label>Google Sheets Webhook URL</label>
                        <input type="url" name="google_sheets_webhook" value="${SEVICH.escapeAttr(config.google_sheets_webhook)}" placeholder="https://script.google.com/macros/s/.../exec">
                        <small style="color:#888; display:block; margin-top:4px;">
                            📘 <a href="../docs/google-sheets-setup.html" target="_blank">دليل الإعداد</a>
                        </small>
                    </div>
                    
                    <div style="display:flex; gap:8px;">
                        <button type="submit" class="btn-admin btn-primary">💾 حفظ</button>
                        <button type="button" class="btn-admin btn-success" id="testSheetsBtn" ${!config.google_sheets_webhook ? 'disabled' : ''}>
                            🧪 اختبار الاتصال
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div class="admin-card" style="margin-top:20px;">
        <div class="admin-card-header">
            <h2>🔐 الأمان</h2>
        </div>
        <div class="admin-card-body">
            <form class="admin-form" id="passwordForm" style="max-width:500px;">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" name="admin_username" value="${SEVICH.escapeAttr(config.admin_username)}">
                </div>
                
                <div class="form-group">
                    <label>كلمة المرور الحالية</label>
                    <input type="password" name="current_password" required autocomplete="current-password">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>كلمة المرور الجديدة</label>
                        <input type="password" name="new_password" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-admin btn-danger">🔒 تغيير كلمة المرور</button>
            </form>
        </div>
    </div>
    
    <div class="admin-card" style="margin-top:20px;">
        <div class="admin-card-header">
            <h2>🗄️ البيانات (تخزين المتصفح)</h2>
        </div>
        <div class="admin-card-body">
            <p style="margin-bottom:16px; color:#666; font-size:13px;">
                ⚠️ كل البيانات (الطلبات، السلال المتروكة، المنتجات) محفوظة في متصفحك (localStorage). 
                نوصي بشدة بربط Google Sheets للحصول على نسخ احتياطية تلقائية.
            </p>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn-admin btn-outline" id="exportBtn">📥 تصدير كل البيانات (JSON)</button>
                <button class="btn-admin btn-danger" id="resetBtn">🗑️ إعادة تعيين كل البيانات</button>
            </div>
        </div>
    </div>
    `;
    
    bindForms();
}

function bindForms() {
    document.getElementById('generalForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        SEVICH.saveConfig({
            site_name: fd.get('site_name'),
            site_tagline: fd.get('site_tagline'),
            whatsapp_number: fd.get('whatsapp_number'),
            email: fd.get('email'),
            shipping_home: parseFloat(fd.get('shipping_home')) || 600,
            shipping_office: parseFloat(fd.get('shipping_office')) || 400,
            max_cart_items: parseInt(fd.get('max_cart_items')) || 3,
        });
        showAlert('success', '✓ تم حفظ الإعدادات');
    });
    
    document.getElementById('marketingForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        SEVICH.saveConfig({
            facebook_pixel_id: fd.get('facebook_pixel_id').trim(),
            google_sheets_webhook: fd.get('google_sheets_webhook').trim(),
        });
        showAlert('success', '✓ تم حفظ إعدادات التسويق');
        setTimeout(() => render(), 800);
    });
    
    document.getElementById('passwordForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const config = SEVICH.getConfig();
        const current = fd.get('current_password');
        const newPwd = fd.get('new_password');
        const confirmPwd = fd.get('confirm_password');
        
        if (current !== config.admin_password) {
            showAlert('danger', 'كلمة المرور الحالية غير صحيحة');
            return;
        }
        if (newPwd.length < 6) {
            showAlert('danger', 'يجب أن تكون كلمة المرور 6 أحرف على الأقل');
            return;
        }
        if (newPwd !== confirmPwd) {
            showAlert('danger', 'كلمتا المرور غير متطابقتين');
            return;
        }
        
        SEVICH.saveConfig({
            admin_username: fd.get('admin_username') || 'admin',
            admin_password: newPwd,
        });
        showAlert('success', '✓ تم تغيير كلمة المرور');
        e.target.reset();
    });
    
    document.getElementById('testSheetsBtn')?.addEventListener('click', async () => {
        const config = SEVICH.getConfig();
        if (!config.google_sheets_webhook) return;
        
        const btn = document.getElementById('testSheetsBtn');
        btn.disabled = true;
        btn.textContent = 'جاري الاختبار...';
        
        try {
            await fetch(config.google_sheets_webhook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'test',
                    data: { message: 'اختبار الاتصال', timestamp: new Date().toISOString() },
                }),
            });
            showAlert('success', '✓ تم إرسال اختبار الاتصال. تحقق من Google Sheet لرؤية ورقة "Test Log"');
        } catch (err) {
            showAlert('danger', '❌ فشل الاتصال. تأكد من صحة الرابط');
        }
        
        btn.disabled = false;
        btn.textContent = '🧪 اختبار الاتصال';
    });
    
    document.getElementById('exportBtn')?.addEventListener('click', () => {
        const data = {
            config: SEVICH.getConfig(),
            products: SEVICH.getProducts(),
            orders: Admin.getOrders(),
            abandoned: Admin.getAbandoned(),
            exported_at: new Date().toISOString(),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sevich-backup-' + Date.now() + '.json';
        a.click();
        URL.revokeObjectURL(url);
    });
    
    document.getElementById('resetBtn')?.addEventListener('click', () => {
        if (!confirm('هل أنت متأكد؟ سيتم حذف جميع الطلبات والسلال المتروكة والمنتجات والإعدادات. لا يمكن التراجع.')) return;
        if (!confirm('تأكيد نهائي: هذا سيحذف كل شيء!')) return;
        
        Object.values(SEVICH.KEYS).forEach(k => SEVICH.storage.remove(k));
        showAlert('success', '✓ تم إعادة تعيين جميع البيانات. جاري التحويل...');
        setTimeout(() => window.location.href = 'login.html', 1500);
    });
}

function showAlert(type, message) {
    const slot = document.getElementById('alertSlot');
    slot.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    setTimeout(() => slot.innerHTML = '', 4000);
    window.scrollTo(0, 0);
}

render();
</script>

</body>
</html>
