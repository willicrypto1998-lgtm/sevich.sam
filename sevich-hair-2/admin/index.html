<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - Sevich Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
    <div id="sidebarSlot"></div>
    <main class="admin-main" id="mainContent"></main>
</div>

<script src="../assets/js/data.js"></script>
<script src="admin.js"></script>
<script>
Admin.init('dashboard');

const config = SEVICH.getConfig();
const orders = Admin.getOrders();
const abandoned = Admin.getAbandoned();
const products = SEVICH.getProducts();

const totalOrders = orders.length;
const totalAbandoned = abandoned.filter(a => !a.recovered).length;

let totalRevenue = 0;
let pendingOrders = 0;
const today = new Date().toISOString().split('T')[0];
let todayOrders = 0;
let todayRevenue = 0;

orders.forEach(o => {
    const status = o.status || 'pending';
    if (status !== 'cancelled') totalRevenue += o.total || 0;
    if (status === 'pending') pendingOrders++;
    if ((o.created_at || '').startsWith(today) && status !== 'cancelled') {
        todayOrders++;
        todayRevenue += o.total || 0;
    }
});

const recentOrders = orders.slice(-5).reverse();
const recentAbandoned = abandoned.filter(a => !a.recovered).slice(-5).reverse();

const showWebhookWarning = !config.google_sheets_webhook;
const showPasswordWarning = config.admin_password === 'admin123';

document.getElementById('mainContent').innerHTML = `
<div class="admin-header">
    <h1>📊 لوحة التحكم</h1>
    <div style="font-size:13px; color:#666;">
        مرحبا، ${SEVICH.escapeHtml(SEVICH.storage.get(SEVICH.KEYS.ADMIN_SESSION, {}).username || 'admin')}
    </div>
</div>

${showWebhookWarning ? `
<div class="alert alert-warning">
    ⚠️ <strong>تنبيه:</strong> لم يتم ربط Google Sheets بعد. 
    <a href="settings.html" style="font-weight:600;">قم بالإعداد الآن</a>
</div>` : ''}

${showPasswordWarning ? `
<div class="alert alert-danger">
    🚨 <strong>تحذير أمني:</strong> أنت تستعمل كلمة المرور الافتراضية. 
    <a href="settings.html" style="font-weight:600;">غيّرها فورا</a>
</div>` : ''}

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">📦 إجمالي الطلبات</div>
        <div class="stat-value">${totalOrders}</div>
        <div class="stat-change">اليوم: ${todayOrders} طلب</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-label">💰 إجمالي المبيعات</div>
        <div class="stat-value">${totalRevenue.toLocaleString()} DA</div>
        <div class="stat-change">اليوم: ${todayRevenue.toLocaleString()} DA</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-label">⏳ طلبات قيد الانتظار</div>
        <div class="stat-value" style="color:#856404;">${pendingOrders}</div>
        <div class="stat-change" style="color:#856404;">يحتاج المتابعة</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-label">⚠️ سلال متروكة</div>
        <div class="stat-value" style="color:#c41e3a;">${totalAbandoned}</div>
        <div class="stat-change" style="color:#c41e3a;">للمتابعة</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-label">🛍️ المنتجات</div>
        <div class="stat-value">${products.length}</div>
        <div class="stat-change"><a href="products.html">إدارة المنتجات</a></div>
    </div>
</div>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <div class="admin-card">
        <div class="admin-card-header">
            <h2>🛒 آخر الطلبات</h2>
            <a href="orders.html" class="btn-admin btn-sm btn-outline">عرض الكل</a>
        </div>
        <div class="admin-card-body no-padding">
            ${recentOrders.length === 0 ? `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>لا توجد طلبات بعد</p>
                </div>
            ` : `
                <table class="admin-table">
                    <thead>
                        <tr><th>رقم</th><th>الزبون</th><th>المبلغ</th><th>الحالة</th></tr>
                    </thead>
                    <tbody>
                        ${recentOrders.map(o => `
                            <tr onclick="window.location.href='orders.html?view=${encodeURIComponent(o.id)}'" style="cursor:pointer;">
                                <td style="font-family:monospace; font-size:11px;">${SEVICH.escapeHtml(o.id)}</td>
                                <td>${SEVICH.escapeHtml(o.customer.full_name)}</td>
                                <td style="font-weight:600;">${(o.total || 0).toLocaleString()} DA</td>
                                <td><span class="status-badge ${o.status || 'pending'}">${SEVICH.escapeHtml(o.status || 'pending')}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `}
        </div>
    </div>
    
    <div class="admin-card">
        <div class="admin-card-header">
            <h2>⚠️ سلال متروكة (للمتابعة)</h2>
            <a href="abandoned.html" class="btn-admin btn-sm btn-outline">عرض الكل</a>
        </div>
        <div class="admin-card-body no-padding">
            ${recentAbandoned.length === 0 ? `
                <div class="empty-state">
                    <div class="icon">✅</div>
                    <p>لا توجد سلال متروكة</p>
                </div>
            ` : `
                <table class="admin-table">
                    <thead>
                        <tr><th>الزبون</th><th>الهاتف</th><th>المبلغ</th><th>الإجراء</th></tr>
                    </thead>
                    <tbody>
                        ${recentAbandoned.map(a => {
                            const phone = a.customer.phone || '';
                            const phoneClean = phone.replace(/\D/g, '');
                            return `
                            <tr>
                                <td>${SEVICH.escapeHtml(a.customer.name || '—')}</td>
                                <td style="direction:ltr; text-align:right;">${SEVICH.escapeHtml(phone)}</td>
                                <td style="font-weight:600;">${(a.subtotal || 0).toLocaleString()} DA</td>
                                <td>
                                    <a href="https://wa.me/${phoneClean}" target="_blank" class="btn-admin btn-sm btn-success" style="font-size:11px;">
                                        💬 WhatsApp
                                    </a>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            `}
        </div>
    </div>
</div>
`;
</script>

</body>
</html>
